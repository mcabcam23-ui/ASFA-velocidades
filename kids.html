<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modo Peques - Notas Musicales</title>
  <link rel="stylesheet" href="kids.css">
</head>
<body>
  <main class="kids-app">
    <a class="back-link" href="index.html">← Volver a juegos</a>
    <h1>Modo Peques</h1>
    <p class="subtitle">Toca la nota correcta y suma estrellas.</p>

    <section class="hud" aria-label="Puntuacion">
      <p id="score">Puntos: 0</p>
      <p id="streak">Racha: 0</p>
    </section>

    <section class="prompt-card" aria-live="polite">
      <p class="prompt-label">Busca esta nota:</p>
      <p id="targetNote" class="target">DO</p>
      <p id="message" class="message">Pulsa "Nueva ronda" para empezar.</p>
    </section>

    <section id="options" class="options" aria-label="Opciones de notas"></section>

    <section class="actions">
      <button id="newRoundBtn" type="button">Nueva ronda</button>
    </section>
  </main>

  <script src="kids.js"></script>
</body>
</html>
