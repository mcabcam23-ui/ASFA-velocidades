<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego señales ferroviarias</title>
  <link rel="stylesheet" href="railway.css">
</head>
<body>
  <main class="container">
    <h1>Relaciona la señal ferroviaria con su velocidad</h1>
    <p class="subtitle">Basado en la tabla ASFA.</p>

    <section class="mode-panel" aria-label="Selector de modo">
      <label for="modeSelect">Modo:</label>
      <select id="modeSelect">
        <option value="conv">Convencional</option>
        <option value="conv-plus">Convencional con aumento</option>
        <option value="av">Alta velocidad</option>
        <option value="av-plus">Alta velocidad con aumento</option>
        <option value="conv-all">Convencional al completo</option>
        <option value="av-all">Alta velocidad al completo</option>
        <option value="all">Todo</option>
      </select>
      <button id="modeBtn" type="button" class="secondary">Cargar modo</button>
    </section>

    <section class="bank" aria-label="Respuestas de velocidad"></section>
    <section class="grid" aria-label="Tarjetas de señales"></section>

    <section class="actions">
      <button id="checkBtn" type="button">Corregir</button>
      <button id="resetBtn" type="button" class="secondary">Reiniciar</button>
      <button id="newBtn" type="button" class="secondary">Nueva ronda</button>
    </section>

    <p id="result" aria-live="polite"></p>
  </main>

  <script src="railway.js"></script>
</body>
</html>
